services:
  - type: web
    name: hello-fullstack-py
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      # Restrict CORS to the GitHub Pages origin that hosts the frontend.
      # Use a comma-separated list to allow multiple origins if needed.
      - key: CORS_ALLOW_ORIGINS
        value: "https://ts58gh.github.io"
