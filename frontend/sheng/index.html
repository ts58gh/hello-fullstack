<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>升级 — 试玩</title>
    <link rel="stylesheet" href="./sheng.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <a href="../">Hello Fullstack</a>
        <span class="sep">/</span>
        <a href="../bridge/">Bridge</a>
        <span class="sep">·</span>
        <span>升级</span>
      </div>
      <div class="topright row">
        <label class="row" style="gap: 6px">
          API
          <input
            id="apiBaseInput"
            type="text"
            placeholder="online 默认 Render 后端"
            size="42"
          />
        </label>
        <span class="pill" id="apiPill"></span>
        <span class="pill conn" id="wsPill">WS: —</span>
      </div>
    </header>

    <main>
      <p class="hint-line" style="margin: 0 0 12px; font-size: 13px; color: var(--muted, #8a9e8f)">
        <strong style="color: var(--fg, inherit)">在线试玩：</strong>
        GitHub Pages 打开本页时，会自动连接公共演示后端 Render（见上方 API）。勾选「其他座位自动出牌」后可单手试玩。若你连不上，可把 API 改成你自己的后端地址；自建部署时须在 Render 上设置
        <code>CORS_ALLOW_ORIGINS=https://你的用户名.github.io</code>
        （与仓库 Pages 所用域名一致）。
      </p>
      <section class="toolbar" id="setup">
        <button type="button" class="btn primary" id="btn4">开桌 · 四人</button>
        <button type="button" class="btn primary" id="btn6">开桌 · 六人</button>
        <label class="row"
          >种子 <input id="seedIn" type="number" placeholder="随机" style="width: 9em"
        /></label>
        <button type="button" class="btn ghost" id="btnLeave">离开本桌</button>
        <label class="row" style="gap: 6px; align-items: center">
          <input type="checkbox" id="chkAutoBot" checked />
          <span style="font-size: 13px">其他座位代出首张合法牌（单手试玩）</span>
        </label>
      </section>

      <div class="seat-strip hidden" id="seatStrip">
        <span style="font-size: 12px; color: var(--muted)">本地座位（热座试玩切换视角）：</span>
        <span id="seatBtns"></span>
      </div>

      <div class="felt">
        <div class="row" style="justify-content: space-between; margin-bottom: 8px">
          <div id="metaLine" style="font-size: 13px"></div>
          <button type="button" class="btn hidden" id="btnNext">下一副</button>
        </div>
        <div class="trick" id="trickArea"></div>
        <p class="hands-title">你当前视角的手牌</p>
        <div class="card-row" id="handArea"></div>
        <div class="statusline" id="statusLine"></div>
        <div class="summary hidden" id="summaryBox"></div>
      </div>

      <div class="events">
        <span>最近事件 / 调试</span>
        <pre id="eventLog">{}</pre>
      </div>
    </main>

    <script src="./sheng.js"></script>
  </body>
</html>
